<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>My Nutrition Dashboard · Thrae</title>
<meta property="og:title" content="My Nutrition Dashboard · Thrae">
<meta property="og:description" content="Personal health dashboard powered by Thrae AI">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F1115;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:480px;padding:20px 16px 40px}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:20px;font-weight:700;margin-bottom:2px}
.header .date{color:#9CA3AF;font-size:13px}
.card{background:#1A1D23;border:1px solid #2A2F38;border-radius:16px;padding:20px;margin-bottom:16px}
.cal-display{text-align:center;margin-bottom:16px}
.cal-big{font-size:36px;font-weight:700;letter-spacing:-1px}
.cal-big .target{color:#9CA3AF;font-weight:400;font-size:24px}
.cal-label{color:#9CA3AF;font-size:13px;margin-top:2px}
.progress-bg{background:#2A2F38;border-radius:8px;height:10px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;border-radius:8px;transition:width .5s ease}
.macro{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.macro:last-child{margin-bottom:0}
.macro-label{font-size:14px;font-weight:500;width:70px}
.macro-bar-wrap{flex:1;margin:0 12px}
.macro-bar-bg{background:#2A2F38;border-radius:6px;height:8px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:6px;transition:width .5s ease}
.macro-val{font-size:13px;color:#9CA3AF;width:90px;text-align:right}
.macro-val span{color:#fff;font-weight:500}
.section-title{font-size:15px;font-weight:600;margin-bottom:8px}
.meal{padding:14px 0;border-bottom:1px solid #2A2F38}
.meal:last-child{border-bottom:none}
.meal-header{display:flex;justify-content:space-between;align-items:center}
.meal-type{font-size:15px;font-weight:500}
.meal-time{color:#9CA3AF;font-size:13px;margin-left:8px}
.meal-stats{text-align:right;font-size:13px;color:#9CA3AF}
.meal-stats .cal{color:#fff;font-weight:500}
.meal-stats .pro{color:#00E096}
.meal-desc{color:#9CA3AF;font-size:13px;margin-top:4px;line-height:1.4}
.footer{text-align:center;color:#9CA3AF;font-size:12px;margin-top:8px;line-height:1.6}
.footer a{color:#00E096;text-decoration:none}
.loading{text-align:center;padding:60px 20px;color:#9CA3AF}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid #2A2F38;border-top-color:#00E096;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-card{background:#1A1D23;border:1px solid #2A2F38;border-radius:16px;padding:40px 24px;text-align:center;max-width:400px;width:100%}
.error-card h2{font-size:24px;margin-bottom:12px}
.error-card p{color:#9CA3AF;font-size:15px;line-height:1.5}
.empty{text-align:center;padding:32px 16px;color:#9CA3AF}
.empty .icon{font-size:32px;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading your dashboard...</p>
  </div>
</div>
<script>
const API = 'https://hgqzgrrydsgythsgtdiz.supabase.co/functions/v1/web-dashboard';

function fmt(n) { return n.toLocaleString('en-US'); }
function pct(c, t) { return t <= 0 ? 0 : Math.min(100, Math.round((c / t) * 100)); }
function color(c, t) { return t <= 0 ? '#00E096' : (c / t >= 0.7 ? '#00E096' : '#F59E0B'); }

async function load() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const app = document.getElementById('app');

  if (!token) {
    app.innerHTML = '<div class="error-card"><h2>🧬 Thrae</h2><p>No token provided. Ask your health agent for a dashboard link.</p></div>';
    return;
  }

  try {
    const res = await fetch(API + '?token=' + encodeURIComponent(token));
    const d = await res.json();

    if (!d.ok) {
      app.innerHTML = '<div class="error-card"><h2>🧬 Thrae</h2><p>' + (d.error || 'Something went wrong.') + '</p></div>';
      return;
    }

    let mealsHtml = '';
    if (d.meals.length === 0) {
      mealsHtml = '<div class="empty"><div class="icon">🍽️</div><p>No meals logged yet today.</p><p style="margin-top:8px;font-size:13px">Send a message to your health agent to get started!</p></div>';
    } else {
      for (const m of d.meals) {
        const desc = m.itemNames || m.text || '';
        const typeLabel = m.type ? m.type.charAt(0).toUpperCase() + m.type.slice(1) : 'Meal';
        mealsHtml += '<div class="meal"><div class="meal-header"><div><span class="meal-type">' + m.emoji + ' ' + typeLabel + '</span><span class="meal-time">' + m.time + '</span></div><div class="meal-stats"><span class="cal">' + Math.round(m.calories) + '</span> cal · <span class="pro">' + Math.round(m.protein) + 'g</span> protein</div></div>' + (desc ? '<div class="meal-desc">' + desc + '</div>' : '') + '</div>';
      }
    }

    app.innerHTML = ''
      + '<div class="header"><h1>🧬 Thrae · ' + d.displayName + '</h1><div class="date">' + d.displayDate + '</div></div>'
      + '<div class="card">'
      + '<div class="cal-display"><div class="cal-big">' + fmt(d.calories.current) + ' <span class="target">/ ' + fmt(d.calories.target) + '</span></div><div class="cal-label">calories</div><div class="progress-bg"><div class="progress-fill" style="width:' + pct(d.calories.current, d.calories.target) + '%;background:' + color(d.calories.current, d.calories.target) + '"></div></div></div>'
      + '<div class="macro"><div class="macro-label">Protein</div><div class="macro-bar-wrap"><div class="macro-bar-bg"><div class="macro-bar-fill" style="width:' + pct(d.protein.current, d.protein.target) + '%;background:' + color(d.protein.current, d.protein.target) + '"></div></div></div><div class="macro-val"><span>' + d.protein.current + 'g</span> / ' + d.protein.target + 'g</div></div>'
      + '<div class="macro"><div class="macro-label">Carbs</div><div class="macro-bar-wrap"><div class="macro-bar-bg"><div class="macro-bar-fill" style="width:' + pct(d.carbs.current, d.carbs.target) + '%;background:' + color(d.carbs.current, d.carbs.target) + '"></div></div></div><div class="macro-val"><span>' + d.carbs.current + 'g</span> / ' + d.carbs.target + 'g</div></div>'
      + '<div class="macro"><div class="macro-label">Fat</div><div class="macro-bar-wrap"><div class="macro-bar-bg"><div class="macro-bar-fill" style="width:' + pct(d.fat.current, d.fat.target) + '%;background:' + color(d.fat.current, d.fat.target) + '"></div></div></div><div class="macro-val"><span>' + d.fat.current + 'g</span> / ' + d.fat.target + 'g</div></div>'
      + '</div>'
      + '<div class="card"><div class="section-title">Today\'s Meals</div>' + mealsHtml + '</div>'
      + '<div class="footer">Powered by Thrae 🧬<br>Get your AI health agent → <a href="https://t.me/ThraeAI_Bot">t.me/ThraeAI_Bot</a></div>';
  } catch (e) {
    app.innerHTML = '<div class="error-card"><h2>🧬 Thrae</h2><p>Could not load your dashboard. Please try again.</p></div>';
  }
}

load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ThraeAI · My Health</title>
<meta property="og:title" content="ThraeAI Health Dashboard">
<meta property="og:description" content="Your personal health dashboard powered by ThraeAI">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F1115;
  --card: #1A1D23;
  --elevated: #242830;
  --border: #2A2F38;
  --accent: #34D399;
  --accent-dim: rgba(52,211,153,0.15);
  --text: #FFFFFF;
  --text-sec: #9CA3AF;
  --dark-text: #0F1115;
  --red: #EF4444;
  --amber: #F59E0B;
  --touch: 48px;
}
[data-theme="light"] {
  --bg: #F9FAFB;
  --card: #FFFFFF;
  --elevated: #F3F4F6;
  --border: #E5E7EB;
  --text: #111827;
  --text-sec: #6B7280;
  --dark-text: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.wrap { width: 100%; max-width: 480px; padding: 12px 16px 100px; }
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0 4px;
}
.header h1 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; }
.header-right { display: flex; gap: 8px; align-items: center; }
.greeting { color: var(--text-sec); font-size: 13px; margin-bottom: 8px; }

/* Date Strip */
.date-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 12px 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
  scroll-snap-type: x mandatory;
}
.date-strip::-webkit-scrollbar { display: none; }
.date-chip {
  flex-shrink: 0;
  scroll-snap-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: var(--touch);
  width: 52px;
  height: 64px;
  border-radius: 14px;
  background: var(--card);
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s ease;
}
.date-chip .day-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-sec);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.date-chip .day-num {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
/* Today (not selected): subtle dot indicator */
.date-chip[data-today="true"] { position: relative; }
.date-chip[data-today="true"]::after {
  content: '';
  position: absolute;
  bottom: 6px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}
/* Selected: solid accent fill */
.date-chip[data-selected="true"] {
  background: var(--accent);
  border-color: var(--accent);
}
.date-chip[data-selected="true"] .day-name,
.date-chip[data-selected="true"] .day-num { color: var(--dark-text); }
/* Today + Selected: fill + white border */
.date-chip[data-today="true"][data-selected="true"] {
  background: var(--accent);
  border-color: #FFFFFF;
}
.date-chip[data-today="true"][data-selected="true"]::after { display: none; }

/* Tab Bar */
.tab-bar {
  display: flex;
  background: var(--card);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sec);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: none;
}
.tab.active {
  background: var(--accent);
  color: var(--dark-text);
}

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  transition: background 0.3s, border-color 0.3s;
}

/* Calories */
.cal-display { text-align: center; margin-bottom: 16px; }
.cal-big { font-size: 36px; font-weight: 700; letter-spacing: -1px; }
.cal-big .target { color: var(--text-sec); font-weight: 400; font-size: 24px; }
.cal-label { color: var(--text-sec); font-size: 13px; margin-top: 2px; }
.progress-bg { background: var(--border); border-radius: 8px; height: 10px; overflow: hidden; margin-top: 10px; }
.progress-fill { height: 100%; border-radius: 8px; transition: width 0.5s ease; }

/* Macros */
.macro { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.macro:last-child { margin-bottom: 0; }
.macro-label { font-size: 14px; font-weight: 500; width: 70px; }
.macro-bar-wrap { flex: 1; margin: 0 12px; }
.macro-bar-bg { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
.macro-val { font-size: 14px; font-weight: 700; width: 80px; text-align: right; }
.macro-val .unit { color: var(--text-sec); font-weight: 400; font-size: 12px; }

/* Meals */
.meal-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.meal-item:last-child { border-bottom: none; }
.meal-emoji { font-size: 24px; min-width: 32px; text-align: center; padding-top: 2px; }
.meal-info { flex: 1; }
.meal-type { font-size: 13px; font-weight: 600; text-transform: capitalize; margin-bottom: 2px; }
.meal-text { font-size: 13px; color: var(--text-sec); line-height: 1.4; }
.meal-meta { font-size: 12px; color: var(--text-sec); margin-top: 4px; display: flex; gap: 12px; }
.meal-cal { font-weight: 600; color: var(--accent); }

/* Supplements */
.supp-summary { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
.supp-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.supp-ring svg { transform: rotate(-90deg); }
.ring-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 18px;
  font-weight: 700;
}
.supp-summary-text h3 { font-size: 16px; margin-bottom: 4px; }
.supp-summary-text p { font-size: 13px; color: var(--text-sec); }
.supp-section-label { font-size: 12px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
.supp-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.supp-item:last-child { border-bottom: none; }
.supp-info { flex: 1; }
.supp-name { font-size: 14px; font-weight: 600; }
.supp-dosage { font-size: 12px; color: var(--text-sec); }
.supp-status { font-size: 12px; margin-top: 2px; }
.supp-status.taken { color: var(--accent); }
.supp-status.not-taken { color: var(--text-sec); }
.supp-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 80px;
  text-align: center;
}
.supp-btn.take { background: var(--elevated); color: var(--text-sec); }
.supp-btn.taken { background: var(--accent); color: var(--dark-text); }

/* Settings */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 14px; font-weight: 500; }
.setting-desc { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
.toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--border);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(20px); }
.toggle.saving { opacity: 0.5; pointer-events: none; }

/* Theme toggle */
.theme-toggle {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: var(--text-sec); }
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--elevated) 25%, var(--border) 50%, var(--elevated) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-sec); }
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state h3 { color: var(--text); margin-bottom: 8px; }

/* Footer */
.footer { text-align: center; padding: 20px; color: var(--text-sec); font-size: 12px; }
.footer a { color: var(--accent); text-decoration: none; }

/* Error */
.error-card { background: rgba(239,68,68,0.1); border-color: var(--red); }
.error-card h3 { color: var(--red); }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading your health data...</p>
  </div>
</div>

<script>
const API_BASE = 'https://hgqzgrrydsgythsgtdiz.supabase.co/functions/v1/web-dashboard';
let currentToken = '';
let currentDate = '';
let todayStr = '';
let currentTab = 'nutrition';
const suppState = {};

// --- Init ---
(function init() {
  const params = new URLSearchParams(location.search);
  currentToken = params.get('token') || localStorage.getItem('thrae_token') || '';
  if (!currentToken) {
    showError('No access token', 'Ask your health agent for a dashboard link.');
    return;
  }
  localStorage.setItem('thrae_token', currentToken);
  // Load theme
  const saved = localStorage.getItem('thrae_theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  fetchData();
})();

async function fetchData(date) {
  let url = `${API_BASE}?token=${encodeURIComponent(currentToken)}&format=json`;
  if (date) url += `&date=${date}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.ok) {
      showError(data.error === 'Token expired' ? 'Session expired' : 'Error', data.error || 'Failed to load data');
      return;
    }
    if (!currentDate) {
      todayStr = data.availableDates ? data.availableDates[0] : data.requestedDate;
    }
    currentDate = data.requestedDate;
    render(data);
  } catch (e) {
    showError('Connection error', 'Could not reach the server. Try again.');
  }
}

function showError(title, msg) {
  document.getElementById('app').innerHTML = `
    <div style="padding:60px 20px;text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;">😕</div>
      <h2 style="margin-bottom:8px;">${title}</h2>
      <p style="color:var(--text-sec);font-size:14px;">${msg}</p>
    </div>`;
}

function render(data) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <h1>ThraeAI</h1>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" id="theme-toggle">
          ${document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️'}
        </button>
      </div>
    </div>
    <div class="greeting">Hey ${data.displayName || 'there'} 👋 · ${data.displayDate || ''}</div>
    <div class="date-strip" id="date-strip"></div>
    <div class="tab-bar">
      <button class="tab ${currentTab === 'nutrition' ? 'active' : ''}" onclick="switchTab('nutrition')">🍽️ Nutrition</button>
      <button class="tab ${currentTab === 'supplements' ? 'active' : ''}" onclick="switchTab('supplements')">💊 Supplements</button>
      <button class="tab ${currentTab === 'settings' ? 'active' : ''}" onclick="switchTab('settings')">⚙️ Settings</button>
    </div>
    <div id="tab-content"></div>
    <div class="footer">Made with 💚 by <a href="https://thrae.ai">ThraeAI</a></div>
  `;
  
  if (data.availableDates) renderDateStrip(data.availableDates, currentDate);
  
  if (currentTab === 'nutrition') renderNutrition(data);
  else if (currentTab === 'supplements') renderSupplements(data);
  else if (currentTab === 'settings') renderSettings(data);
}

// --- Date Strip ---
function renderDateStrip(dates, selected) {
  const strip = document.getElementById('date-strip');
  if (!strip) return;
  strip.innerHTML = '';
  const reversed = [...dates].reverse();
  reversed.forEach(dateStr => {
    const d = new Date(dateStr + 'T12:00:00');
    const dayName = d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 3);
    const dayNum = d.getDate();
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selected;
    const chip = document.createElement('div');
    chip.className = 'date-chip';
    chip.innerHTML = `<span class="day-name">${dayName}</span><span class="day-num">${dayNum}</span>`;
    chip.dataset.today = isToday;
    chip.dataset.selected = isSelected;
    chip.onclick = () => selectDate(dateStr, chip);
    strip.appendChild(chip);
  });
  const selectedChip = strip.querySelector('[data-selected="true"]');
  if (selectedChip) selectedChip.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}

function selectDate(dateStr, chip) {
  document.querySelectorAll('.date-chip').forEach(c => c.dataset.selected = 'false');
  if (chip) chip.dataset.selected = 'true';
  currentDate = dateStr;
  fetchData(dateStr);
}

function switchTab(tab) {
  currentTab = tab;
  fetchData(currentDate);
}

// --- Nutrition Tab ---
function renderNutrition(data) {
  const el = document.getElementById('tab-content');
  const cal = data.calories || {};
  const prot = data.protein || {};
  const carbs = data.carbs || {};
  const fat = data.fat || {};
  const meals = data.meals || [];
  
  const calPct = cal.target ? Math.min(Math.round((cal.current / cal.target) * 100), 100) : 0;
  const calColor = calPct > 100 ? 'var(--red)' : calPct > 80 ? 'var(--amber)' : 'var(--accent)';
  
  el.innerHTML = `
    <div class="card">
      <div class="cal-display">
        <div class="cal-big">${cal.current || 0} <span class="target">/ ${cal.target || 2000}</span></div>
        <div class="cal-label">calories</div>
        <div class="progress-bg">
          <div class="progress-fill" style="width:${calPct}%;background:${calColor}"></div>
        </div>
      </div>
    </div>
    <div class="card">
      ${renderMacro('Protein', prot, '#34D399')}
      ${renderMacro('Carbs', carbs, '#60A5FA')}
      ${renderMacro('Fat', fat, '#FBBF24')}
    </div>
    <div class="card">
      <h3 style="font-size:16px;margin-bottom:12px;">Meals (${meals.length})</h3>
      ${meals.length > 0 ? meals.map(renderMeal).join('') : `
        <div class="empty-state">
          <div class="emoji">🍽️</div>
          <h3>No meals logged</h3>
          <p>Tell your health agent what you ate!</p>
        </div>`}
    </div>
  `;
}

function renderMacro(label, data, color) {
  const cur = data.current || 0;
  const tgt = data.target || 100;
  const pct = Math.min(Math.round((cur / tgt) * 100), 100);
  return `
    <div class="macro">
      <span class="macro-label">${label}</span>
      <div class="macro-bar-wrap">
        <div class="macro-bar-bg">
          <div class="macro-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>
      <span class="macro-val">${cur}<span class="unit">/${tgt}g</span></span>
    </div>`;
}

function renderMeal(meal) {
  return `
    <div class="meal-item">
      <span class="meal-emoji">${meal.emoji || '🍽️'}</span>
      <div class="meal-info">
        <div class="meal-type">${meal.type || 'Meal'}</div>
        <div class="meal-text">${meal.itemNames || meal.text || ''}</div>
        <div class="meal-meta">
          <span class="meal-cal">${meal.calories || 0} cal</span>
          <span>${meal.protein || 0}g protein</span>
          <span>${meal.time || ''}</span>
        </div>
      </div>
    </div>`;
}

// --- Supplements Tab ---
function renderSupplements(data) {
  const el = document.getElementById('tab-content');
  const supps = data.supplements || {};
  const catalog = supps.catalog || [];
  const summary = supps.summary || { taken: 0, total: 0 };
  
  if (catalog.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty-state">
      <div class="emoji">💊</div>
      <h3>No supplements tracked yet</h3>
      <p>Ask your health agent to set up your supplement list.</p>
    </div></div>`;
    return;
  }
  
  // Init suppState from catalog
  catalog.forEach(s => { if (!(s.id in suppState)) suppState[s.id] = s.taken; });
  
  const pct = summary.total > 0 ? Math.round((summary.taken / summary.total) * 100) : 0;
  const circumference = 2 * Math.PI * 32;
  const offset = circumference - (pct / 100) * circumference;
  
  const supplements = catalog.filter(s => s.type !== 'medication');
  const medications = catalog.filter(s => s.type === 'medication');
  
  el.innerHTML = `
    <div class="card">
      <div class="supp-summary">
        <div class="supp-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="32" fill="none" stroke="var(--border)" stroke-width="6"/>
            <circle cx="40" cy="40" r="32" fill="none" stroke="var(--accent)" stroke-width="6"
              stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
          </svg>
          <div class="ring-text">${summary.taken}/${summary.total}</div>
        </div>
        <div class="supp-summary-text">
          <h3>${summary.taken} of ${summary.total} taken</h3>
          <p>${pct === 100 ? 'All done! 🎉' : pct > 0 ? 'Keep it up!' : 'Time to take your supplements'}</p>
        </div>
      </div>
      ${medications.length > 0 ? `<div class="supp-section-label">💊 Medications</div>${medications.map(renderSuppItem).join('')}` : ''}
      ${supplements.length > 0 ? `<div class="supp-section-label">🧬 Supplements</div>${supplements.map(renderSuppItem).join('')}` : ''}
    </div>
  `;
}

function renderSuppItem(s) {
  const takenClass = s.taken ? 'taken' : 'not-taken';
  const timeStr = s.taken && s.logged_at ? `Taken at ${formatTime(s.logged_at)}` : 'Not yet';
  const reminderStr = !s.taken && s.reminder_time ? ` · ⏰ ${s.reminder_time}` : '';
  const btnClass = s.taken ? 'supp-btn taken' : 'supp-btn take';
  const btnLabel = s.taken ? 'Taken ✓' : 'Take';
  return `
    <div class="supp-item">
      <div class="supp-info">
        <div class="supp-name">${s.name}</div>
        ${s.dosage ? `<div class="supp-dosage">${s.dosage}</div>` : ''}
        <div class="supp-status ${takenClass}" style="text-align:left;margin-top:2px;">${timeStr}${reminderStr}</div>
      </div>
      <button class="${btnClass}" onclick="toggleSupplement('${esc(s.id)}', '${esc(s.name)}')">${btnLabel}</button>
    </div>`;
}

function esc(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

async function toggleSupplement(id, name) {
  // Derive current state from DOM
  let currentlyTaken = false;
  document.querySelectorAll('.supp-item').forEach(el => {
    if (el.querySelector('.supp-name')?.textContent === name) {
      currentlyTaken = el.querySelector('.supp-btn')?.classList.contains('taken') || false;
    }
  });
  
  if (suppState[id + '_busy']) return;
  suppState[id + '_busy'] = true;
  
  const action = currentlyTaken ? 'unlog_supplement' : 'log_supplement';
  const body = { action, supplement_id: id, supplement_name: name, date: currentDate };
  
  // Optimistic UI
  document.querySelectorAll('.supp-item').forEach(el => {
    if (el.querySelector('.supp-name')?.textContent === name) {
      const btn = el.querySelector('.supp-btn');
      const status = el.querySelector('.supp-status');
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.6';
      if (!currentlyTaken) {
        btn.className = 'supp-btn taken'; btn.textContent = 'Taken ✓';
        status.className = 'supp-status taken'; status.textContent = 'Just now';
      } else {
        btn.className = 'supp-btn take'; btn.textContent = 'Take';
        status.className = 'supp-status not-taken'; status.textContent = 'Not yet';
      }
      setTimeout(() => { btn.style.pointerEvents = ''; btn.style.opacity = ''; }, 800);
    }
  });
  
  suppState[id] = !currentlyTaken;
  updateSuppSummary();
  
  try {
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentToken}` },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!data.ok) {
      suppState[id] = currentlyTaken;
      fetchData(currentDate);
    }
  } catch {
    suppState[id] = currentlyTaken;
    fetchData(currentDate);
  } finally {
    suppState[id + '_busy'] = false;
  }
}

function updateSuppSummary() {
  const total = Object.keys(suppState).filter(k => !k.endsWith('_busy')).length;
  const taken = Object.keys(suppState).filter(k => !k.endsWith('_busy') && suppState[k]).length;
  const ringText = document.querySelector('.ring-text');
  if (ringText) ringText.textContent = `${taken}/${total}`;
  const summaryText = document.querySelector('.supp-summary-text h3');
  if (summaryText) summaryText.textContent = `${taken} of ${total} taken`;
  const summaryP = document.querySelector('.supp-summary-text p');
  if (summaryP) summaryP.textContent = taken === total ? 'All done! 🎉' : taken > 0 ? 'Keep it up!' : 'Time to take your supplements';
}

// --- Settings Tab ---
function renderSettings(data) {
  const el = document.getElementById('tab-content');
  const ns = data.notificationSettings || {};
  const settings = [
    { field: 'morning_checkin_enabled', label: 'Morning Briefing', desc: 'Daily health & nutrition summary at 7 AM' },
    { field: 'evening_reflection_enabled', label: 'Evening Check-in', desc: 'Nutrition recap at 8 PM' },
    { field: 'habit_reminders_enabled', label: 'Meal Reminders', desc: 'Breakfast & lunch logging nudges' },
    { field: 'weekly_summary_enabled', label: 'Weekly Summary', desc: 'Weekly nutrition & health trends' },
    { field: 'insight_alerts_enabled', label: 'Health Insights', desc: 'Notable changes in your health data' },
    { field: 'product_updates_enabled', label: 'Product Updates', desc: 'New features & improvements' },
  ];
  
  el.innerHTML = `
    <div class="card">
      <h3 style="font-size:16px;margin-bottom:16px;">Notifications</h3>
      ${settings.map(n => {
        const isOn = ns[n.field] !== false;
        return `
          <div class="setting-row">
            <div>
              <div class="setting-label">${n.label}</div>
              <div class="setting-desc">${n.desc}</div>
            </div>
            <div class="toggle ${isOn ? 'on' : ''}" id="toggle-${n.field}" onclick="toggleNotif('${n.field}')"></div>
          </div>`;
      }).join('')}
    </div>
  `;
}

async function toggleNotif(field) {
  const toggle = document.getElementById('toggle-' + field);
  const wasOn = toggle.classList.contains('on');
  const newValue = !wasOn;
  
  toggle.classList.toggle('on');
  toggle.classList.add('saving');
  
  try {
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentToken}` },
      body: JSON.stringify({ field, value: newValue }),
    });
    const data = await res.json();
    if (!data.ok) toggle.classList.toggle('on');
  } catch {
    toggle.classList.toggle('on');
  } finally {
    toggle.classList.remove('saving');
  }
}

// --- Helpers ---
function formatTime(isoStr) {
  try {
    return new Date(isoStr).toLocaleTimeString('en-US', {
      timeZone: 'America/New_York',
      hour: 'numeric', minute: '2-digit', hour12: true
    });
  } catch { return ''; }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next === 'dark' ? '' : 'light');
  localStorage.setItem('thrae_theme', next);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next === 'light' ? '🌙' : '☀️';
}

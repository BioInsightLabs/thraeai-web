<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ThraeAI · My Health</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F3F5;--card:#FFFFFF;--elevated:#F2F3F5;--border:#E8E8E8;
  --accent:#1EC77A;--accent-dim:rgba(30,199,122,0.12);
  --text:#1A1A1A;--text-sec:#6B7280;--text-muted:#9CA3AF;
  --on-accent:#FFF;--shadow:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
  --red:#E53E3E;--amber:#F59E0B;
}
[data-theme="dark"]{
  --bg:#0F1115;--card:#1A1D23;--elevated:#242830;--border:#2A2F38;
  --text:#FFFFFF;--text-sec:#9CA3AF;--text-muted:#6B7280;
  --on-accent:#0F1115;--shadow:none;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  -webkit-tap-highlight-color:transparent;transition:background .3s,color .3s}
.wrap{width:100%;max-width:420px;padding:0 0 100px}

/* Header */
.header{text-align:center;padding:16px 20px 8px;position:relative}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.app-icon{width:44px;height:44px;background:#1A1A2E;border-radius:12px;display:flex;align-items:center;justify-content:center}
.app-icon-t{color:#fff;font-size:22px;font-weight:800}
.app-name{font-size:22px;font-weight:700;color:var(--text)}
.app-name b{color:var(--accent);font-weight:700}
.greeting-text{font-size:26px;font-weight:700;margin-bottom:4px}
.date-text{font-size:15px;color:var(--text-sec);margin-bottom:4px}
.theme-btn{position:absolute;top:24px;right:20px;width:36px;height:36px;border:none;background:none;
  cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;border-radius:10px}

/* Date Strip */
.date-strip{display:flex;justify-content:space-between;padding:12px 16px;gap:4px}
.date-chip{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:50px;height:64px;border-radius:16px;cursor:pointer;transition:all .2s;
  background:transparent;border:1.5px solid var(--border);flex-shrink:0}
.date-chip .dn{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.date-chip .dd{font-size:20px;font-weight:700;color:var(--text)}
.date-chip[data-today="true"]{position:relative}
.date-chip[data-today="true"]::after{content:'';position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.date-chip[data-selected="true"]{background:var(--accent);border-color:var(--accent)}
.date-chip[data-selected="true"] .dn{color:rgba(255,255,255,.85)}
.date-chip[data-selected="true"] .dd{color:#fff}
.date-chip[data-today="true"][data-selected="true"]::after{display:none}
.date-chip[data-today="true"][data-selected="true"]{border-color:#fff}

/* Tabs */
.tab-bar{display:flex;padding:8px 20px 4px;gap:8px}
.tab{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:24px;cursor:pointer;
  font-size:15px;font-weight:600;color:var(--text-sec);background:none;border:none;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--accent);color:#fff}

/* Helper banner */
.banner{padding:16px 24px;text-align:center;line-height:1.6}
.banner p{font-size:14px;color:var(--text-sec)}
.banner a{color:var(--accent);text-decoration:none;font-weight:600}

/* Cards */
.card{background:var(--card);border-radius:16px;padding:20px;margin:0 16px 12px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);transition:background .3s}
[data-theme="dark"] .card{border-color:var(--border);box-shadow:none}

/* Calorie ring */
.cal-ring-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
.cal-ring{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
.cal-ring svg{position:absolute;width:180px;height:180px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.cal-inner{text-align:center;z-index:1}
.cal-num{font-size:44px;font-weight:800;letter-spacing:-1px;line-height:1}
.cal-sub{font-size:14px;color:var(--text-muted);margin-top:2px}

/* Macros row */
.macros-row{display:flex;gap:10px}
.macro-card{flex:1;background:var(--elevated);border-radius:14px;padding:14px 12px 12px;text-align:center;border:1px solid rgba(0,0,0,.03)}
[data-theme="dark"] .macro-card{border-color:var(--border)}
.macro-card .label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.macro-card .val{font-size:24px;font-weight:800;line-height:1.2}
.macro-card .tgt{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.macro-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.macro-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* Meals */
.section-head{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:16px 0 8px}
.meal-item{display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--border)}
.meal-item:last-child{border-bottom:none}
.meal-emoji{font-size:28px;width:40px;text-align:center;flex-shrink:0;padding-top:2px}
.meal-info{flex:1;min-width:0}
.meal-type{font-size:14px;font-weight:700;text-transform:capitalize;margin-bottom:2px}
.meal-text{font-size:13px;color:var(--text-sec);line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.meal-right{text-align:right;flex-shrink:0;padding-left:12px}
.meal-cal{font-size:15px;font-weight:700;color:var(--accent)}
.meal-time{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Supplements */
.supp-summary{display:flex;align-items:center;gap:20px;margin-bottom:16px}
.supp-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.supp-ring svg{transform:rotate(-90deg)}
.supp-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:800}
.supp-summary-text h3{font-size:16px;font-weight:700;margin-bottom:4px}
.supp-summary-text p{font-size:13px;color:var(--text-sec)}
.supp-section{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
.supp-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.supp-item:last-child{border-bottom:none}
.supp-name{font-size:14px;font-weight:600}
.supp-dosage{font-size:12px;color:var(--text-sec)}
.supp-status{font-size:12px;margin-top:2px}
.supp-status.taken{color:var(--accent)}
.supp-status.not-taken{color:var(--text-muted)}
.supp-btn{padding:8px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;min-width:80px;text-align:center}
.supp-btn.take{background:var(--elevated);color:var(--text-sec)}
[data-theme="dark"] .supp-btn.take{background:var(--border)}
.supp-btn.taken{background:var(--accent);color:var(--on-accent)}

/* Settings */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-left{display:flex;align-items:center;gap:12px;flex:1}
.setting-icon{font-size:20px;width:28px;text-align:center}
.setting-label{font-size:14px;font-weight:600}
.setting-desc{font-size:12px;color:var(--text-sec);margin-top:1px}
.badge{display:inline-block;font-size:9px;font-weight:700;background:var(--accent-dim);color:var(--accent);
  padding:2px 6px;border-radius:4px;margin-left:6px;text-transform:uppercase;letter-spacing:.5px;vertical-align:middle}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;
  transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.toggle.saving{opacity:.5;pointer-events:none}

/* Supplement reminders in settings */
.reminder-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.reminder-item:last-child{border-bottom:none}
.reminder-name{font-size:14px;font-weight:600}
.reminder-meta{font-size:12px;color:var(--text-sec);margin-top:1px}
.reminder-time{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-sec);font-weight:600}
.reminder-time .alarm{color:var(--red)}

/* Empty / Loading */
.loading{text-align:center;padding:60px 20px;color:var(--text-sec)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text-sec)}
.empty .e{font-size:40px;margin-bottom:12px}
.empty h3{color:var(--text);margin-bottom:8px}

/* Footer */
.footer{text-align:center;padding:24px;color:var(--text-muted);font-size:12px}
.footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading" id="loading"><div class="spinner"></div><p>Loading your health data...</p></div>
</div>
<script>
const API='https://hgqzgrrydsgythsgtdiz.supabase.co/functions/v1/web-dashboard';
let T='',selDate='',today='',tab='nutrition';
const suppSt={};

(function(){
  const p=new URLSearchParams(location.search);
  T=p.get('token')||localStorage.getItem('thrae_token')||'';
  if(!T){err('No access token','Ask your health agent for a dashboard link.');return}
  localStorage.setItem('thrae_token',T);
  const t=localStorage.getItem('thrae_theme');
  if(t==='dark')document.documentElement.setAttribute('data-theme','dark');
  load();
})();

async function load(date){
  let u=`${API}?token=${encodeURIComponent(T)}&format=json`;
  if(date)u+=`&date=${date}`;
  try{
    const r=await fetch(u),d=await r.json();
    if(!d.ok){err(d.error==='Token expired'?'Session expired':'Error',d.error||'Failed');return}
    if(!selDate){today=d.availableDates?d.availableDates[0]:d.requestedDate}
    selDate=d.requestedDate;
    render(d);
  }catch(e){err('Connection error','Could not reach the server.')}
}

function err(t,m){
  document.getElementById('app').innerHTML=`<div style="padding:60px 20px;text-align:center">
    <div style="font-size:48px;margin-bottom:16px">😕</div><h2 style="margin-bottom:8px">${t}</h2>
    <p style="color:var(--text-sec);font-size:14px">${m}</p></div>`;
}

function isDark(){return document.documentElement.getAttribute('data-theme')==='dark'}

function render(d){
  const a=document.getElementById('app');
  a.innerHTML=`
    <div class="header">
      <div class="logo-row">
        <div class="app-icon"><span class="app-icon-t">T</span></div>
        <span class="app-name">Thrae<b>AI</b></span>
      </div>
      <div class="greeting-text">Hey ${d.displayName||'there'} 👋</div>
      <div class="date-text">${d.displayDate||''}</div>
      <button class="theme-btn" onclick="togTheme()" aria-label="Toggle theme">${isDark()?'☀️':'🌙'}</button>
    </div>
    <div class="date-strip" id="ds"></div>
    <div class="tab-bar">
      <button class="tab ${tab==='nutrition'?'active':''}" onclick="sw('nutrition')">🍽️ Nutrition</button>
      <button class="tab ${tab==='supplements'?'active':''}" onclick="sw('supplements')">💊 Supplements</button>
      <button class="tab ${tab==='settings'?'active':''}" onclick="sw('settings')">⚙️ Settings</button>
    </div>
    <div class="banner"><p>💬 Log food, add supplements, or change reminders — <a href="https://t.me/ThraeAI_Bot" target="_blank">message your health agent</a></p></div>
    <div id="tc"></div>
    <div class="footer">Made with 💚 by <a href="https://thrae.ai">ThraeAI</a></div>`;
  if(d.availableDates)renderDS(d.availableDates,selDate);
  if(tab==='nutrition')renderNut(d);
  else if(tab==='supplements')renderSupp(d);
  else renderSet(d);
}

function renderDS(dates,sel){
  const s=document.getElementById('ds');if(!s)return;s.innerHTML='';
  [...dates].reverse().forEach(dt=>{
    const dd=new Date(dt+'T12:00:00');
    const c=document.createElement('div');c.className='date-chip';
    c.innerHTML=`<span class="dn">${dd.toLocaleDateString('en-US',{weekday:'short'}).slice(0,3)}</span><span class="dd">${dd.getDate()}</span>`;
    c.dataset.today=dt===today;c.dataset.selected=dt===sel;
    c.onclick=()=>{document.querySelectorAll('.date-chip').forEach(x=>x.dataset.selected='false');c.dataset.selected='true';selDate=dt;load(dt)};
    s.appendChild(c);
  });
}

function sw(t){tab=t;load(selDate)}

/* Nutrition */
function renderNut(d){
  const el=document.getElementById('tc');
  const cal=d.calories||{},pr=d.protein||{},cb=d.carbs||{},ft=d.fat||{},meals=d.meals||[];
  const pct=cal.target?Math.min((cal.current/cal.target)*100,100):0;
  const C=2*Math.PI*78,off=C-(pct/100)*C;
  const over=pct>=100;
  el.innerHTML=`
    <div class="card">
      <div class="cal-ring-wrap">
        <div class="cal-ring">
          <svg viewBox="0 0 180 180"><circle class="ring-bg" cx="90" cy="90" r="78"/>
            <circle class="ring-fill" cx="90" cy="90" r="78" stroke-dasharray="${C}" stroke-dashoffset="${off}" ${over?'stroke="var(--amber)"':''}/></svg>
          <div class="cal-inner"><div class="cal-num">${cal.current||0}</div><div class="cal-sub">of ${cal.target||2000} kcal</div></div>
        </div>
      </div>
      <div class="macros-row">
        ${macro('PROTEIN',pr,'var(--accent)')}
        ${macro('CARBS',cb,'#60A5FA')}
        ${macro('FAT',ft,'#FBBF24')}
      </div>
    </div>
    <div class="card">
      <div class="section-head">MEALS${meals.length?` (${meals.length})`:''}</div>
      ${meals.length?meals.map(mealHTML).join(''):`<div class="empty"><div class="e">🍽️</div><h3>No meals logged</h3><p>Tell your health agent what you ate!</p></div>`}
    </div>`;
}

function macro(label,d,color){
  const c=d.current||0,t=d.target||100,p=Math.min(Math.round(c/t*100),100);
  return`<div class="macro-card"><div class="label">${label}</div><div class="val">${c}g</div>
    <div class="tgt">of ${t}g</div><div class="macro-bar"><div class="macro-bar-fill" style="width:${p}%;background:${color}"></div></div></div>`;
}

function mealHTML(m){
  return`<div class="meal-item"><span class="meal-emoji">${m.emoji||mealEmoji(m.type)}</span>
    <div class="meal-info"><div class="meal-type">${m.type||'Meal'}</div><div class="meal-text">${m.itemNames||m.text||''}</div></div>
    <div class="meal-right"><div class="meal-cal">${m.calories||0} cal</div><div class="meal-time">${m.time||''}</div></div></div>`;
}

function mealEmoji(t){return{breakfast:'🍳',lunch:'🍛',dinner:'🍽️',snack:'🍫'}[t]||'🍽️'}

/* Supplements */
function renderSupp(d){
  const el=document.getElementById('tc'),s=d.supplements||{},cat=s.catalog||[],sum=s.summary||{taken:0,total:0};
  if(!cat.length){el.innerHTML=`<div class="card"><div class="empty"><div class="e">💊</div><h3>No supplements tracked</h3><p>Ask your health agent to set up your list.</p></div></div>`;return}
  cat.forEach(x=>{if(!(x.id in suppSt))suppSt[x.id]=x.taken});
  const pct=sum.total?Math.round(sum.taken/sum.total*100):0,C=2*Math.PI*32,off=C-(pct/100)*C;
  const supps=cat.filter(x=>x.type!=='medication'),meds=cat.filter(x=>x.type==='medication');
  el.innerHTML=`<div class="card">
    <div class="supp-summary">
      <div class="supp-ring"><svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="32" fill="none" stroke="var(--border)" stroke-width="6"/>
        <circle cx="40" cy="40" r="32" fill="none" stroke="var(--accent)" stroke-width="6" stroke-dasharray="${C}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>
        <div class="supp-ring-text">${sum.taken}/${sum.total}</div></div>
      <div class="supp-summary-text"><h3>${sum.taken} of ${sum.total} taken</h3>
        <p>${pct===100?'All done! 🎉':pct>0?'Keep it up!':'Time to take your supplements'}</p></div>
    </div>
  </div>
  ${meds.length?`<div class="card"><div class="supp-section" style="margin-top:0">💊 MEDICATIONS</div>${meds.map(suppHTML).join('')}</div>`:''}
  ${supps.length?`<div class="card"><div class="supp-section" style="margin-top:0">🧬 SUPPLEMENTS</div>${supps.map(suppHTML).join('')}</div>`:''}
  `;
}

function suppHTML(s){
  const tk=s.taken,cls=tk?'taken':'not-taken';
  const timeStr=tk&&s.logged_at?`Taken at ${fmtTime(s.logged_at)}`:'Not yet';
  const remind=!tk&&s.reminder_time?` · ⏰ ${s.reminder_time}`:'';
  const dosage=s.dosage?` · ${s.dosage}`:'';
  return`<div class="supp-item"><div><div class="supp-name">${s.name}${dosage?`<span style="color:var(--text-sec);font-weight:400;font-size:12px">${dosage}</span>`:''}</div>
    <div class="supp-status ${cls}">${timeStr}${remind}</div></div>
    <button class="supp-btn ${tk?'taken':'take'}" onclick="togSupp('${esc(s.id)}','${esc(s.name)}')">${tk?'Taken ✓':'Take'}</button></div>`;
}

function updRing(){
  const keys=Object.keys(suppSt).filter(k=>!k.endsWith('_b'));
  const total=keys.length,taken=keys.filter(k=>suppSt[k]).length;
  const rt=document.querySelector('.supp-ring-text');if(rt)rt.textContent=`${taken}/${total}`;
  const h3=document.querySelector('.supp-summary-text h3');if(h3)h3.textContent=`${taken} of ${total} taken`;
  const p=document.querySelector('.supp-summary-text p');
  if(p)p.textContent=taken===total?'All done! 🎉':taken>0?'Keep it up!':'Time to take your supplements';
  const pct=total?taken/total*100:0,C=2*Math.PI*32,off=C-(pct/100)*C;
  const circle=document.querySelector('.supp-ring svg circle:nth-child(2)');
  if(circle)circle.setAttribute('stroke-dashoffset',off);
}

function esc(s){return(s||'').replace(/'/g,"\\'")}

async function togSupp(id,name){
  let cur=false;
  document.querySelectorAll('.supp-item').forEach(el=>{
    if(el.querySelector('.supp-name')?.textContent.startsWith(name))
      cur=el.querySelector('.supp-btn')?.classList.contains('taken')||false;
  });
  if(suppSt[id+'_b'])return;suppSt[id+'_b']=true;
  const act=cur?'unlog_supplement':'log_supplement';
  document.querySelectorAll('.supp-item').forEach(el=>{
    if(!el.querySelector('.supp-name')?.textContent.startsWith(name))return;
    const b=el.querySelector('.supp-btn'),st=el.querySelector('.supp-status');
    b.style.pointerEvents='none';b.style.opacity='.6';
    if(!cur){b.className='supp-btn taken';b.textContent='Taken ✓';st.className='supp-status taken';st.textContent='Just now'}
    else{b.className='supp-btn take';b.textContent='Take';st.className='supp-status not-taken';st.textContent='Not yet'}
    setTimeout(()=>{b.style.pointerEvents='';b.style.opacity=''},800);
  });
  suppSt[id]=!cur;
  updRing();
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${T}`},
      body:JSON.stringify({action:act,supplement_id:id,supplement_name:name,date:selDate})});
    const d=await r.json();if(!d.ok){suppSt[id]=cur;load(selDate)}
  }catch{suppSt[id]=cur;load(selDate)}
  finally{suppSt[id+'_b']=false}
}

/* Settings */
function renderSet(d){
  const el=document.getElementById('tc'),ns=d.notificationSettings||{};
  const notifs=[
    {f:'morning_checkin_enabled',l:'Morning Check-in',d:'Daily health & nutrition summary',i:'🌅'},
    {f:'evening_reflection_enabled',l:'Evening Reflection',d:'Nutrition recap & tomorrow prep',i:'🌙'},
    {f:'insight_alerts_enabled',l:'Insight Alerts',d:'Notable changes in your health data',i:'💡'},
    {f:'weekly_summary_enabled',l:'Weekly Summary',d:'Weekly nutrition & health trends',i:'📊'},
  ];
  const supps=d.supplements?.catalog||[];
  const reminders=supps.filter(s=>s.reminder_time);
  el.innerHTML=`<div class="card">
    <div class="section-head">NOTIFICATION PREFERENCES</div>
    ${notifs.map(n=>{
      const on=ns[n.f]!==false;
      return`<div class="setting-row"><div class="setting-left"><span class="setting-icon">${n.i}</span>
        <div><div class="setting-label">${n.l}<span class="badge">CHAT</span></div><div class="setting-desc">${n.d}</div></div></div>
        <div class="toggle ${on?'on':''}" id="tg-${n.f}" onclick="togNotif('${n.f}')"></div></div>`;
    }).join('')}
  </div>
  ${reminders.length?`<div class="card">
    <div class="section-head">SUPPLEMENT REMINDERS</div>
    ${reminders.map(s=>`<div class="reminder-item"><div>
      <div class="reminder-name">${s.name}</div>
      <div class="reminder-meta">${s.dosage||''} · ${s.schedule_days||'Daily'}</div></div>
      <div class="reminder-time"><span class="alarm">⏰</span> ${s.reminder_time}</div></div>`).join('')}
  </div>`:''}`;
}

async function togNotif(f){
  const t=document.getElementById('tg-'+f),was=t.classList.contains('on');
  t.classList.toggle('on');t.classList.add('saving');
  try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${T}`},
    body:JSON.stringify({field:f,value:!was})});const d=await r.json();if(!d.ok)t.classList.toggle('on')}
  catch{t.classList.toggle('on')}finally{t.classList.remove('saving')}
}

function fmtTime(s){try{return new Date(s).toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true})}catch{return''}}

function togTheme(){
  const dk=isDark(),n=dk?'light':'dark';
  document.documentElement.setAttribute('data-theme',n==='dark'?'dark':'');
  localStorage.setItem('thrae_theme',n);
  document.querySelector('.theme-btn').textContent=n==='dark'?'☀️':'🌙';
}
</script>
</body>
</html>
